<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor Ultra - Jean</title>
    
    <!-- 📦 Biblioteca do Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    
    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; color: #2C3E50; margin-bottom: 5px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .btn { width: 100%; padding: 12px; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-primary { background-color: #2ECC71; }
        .btn-excel { background-color: #2980B9; }
        .btn-danger { background-color: #E74C3C; padding: 8px; font-size: 14px; }
        .btn-action { padding: 6px 12px; font-size: 12px; background-color: #34495E; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        #reader { width: 100%; margin-bottom: 15px; border-radius: 8px; overflow: hidden; background-color: #000; }
        .contador { text-align: center; font-weight: bold; margin-bottom: 10px; color: #7F8C8D; }
        
        .box-vinculo { background-color: #fff3cd; border: 1px solid #ffeeba; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .box-vinculo h4 { margin: 0 0 8px 0; color: #856404; }
        
        .status-produto { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 12px; font-weight: bold; display: none; }
        
        /* Caixa de seleção múltipla quando há equivalência de produtos */
        .box-multiplos-produtos { background-color: #e8f4fd; border: 1px solid #bee5eb; color: #0c5460; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .btn-opcao-prod { background-color: #3498db; color: white; padding: 10px; margin: 5px 0; border: none; border-radius: 4px; width: 100%; text-align: left; font-size: 14px; cursor: pointer; font-weight: bold; }
        
        .historico { margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f2f2f2; }
        .flex-buttons { display: flex; margin-bottom: 10px; }
        
        .manual-active { background-color: #e8f4fd !important; border: 2px solid #3498db !important; }
        #btnBuscarManual { background-color: #3498db; display: none; margin-top: 5px; }
        .input-filtro { margin-bottom: 8px; background-color: #fff; font-size: 14px; border: 1px solid #b5b5b5; }
    </style>
</head>
<body>

<div class="container">
    <h2>Coletor Estoque Ultra</h2>
    <div class="contador" id="contadorItens">Total de itens coletados: 0</div>
    <div id="statusCatalogo" style="text-align: center; font-size: 11px; color: #7F8C8D; margin-bottom: 8px;"></div>
    
    <div id="reader"></div>

    <div class="flex-buttons">
        <button type="button" class="btn-action" onclick="liberarDigitacaoManual()">✏️ Digitar Código Manual</button>
        <button type="button" class="btn-action" onclick="abrirCadastroSemCodigo()">🚫 Produto Sem Código</button>
    </div>
    
    <div class="box-multiplos-produtos" id="boxMultiplos">
        <h4>Equivalência Detectada! Qual item você está contando?</h4>
        <div id="listaOpcoesProdutos"></div>
    </div>
    
    <div class="box-vinculo" id="boxVinculo">
        <h4 id="tituloVinculo">⚠️ Código de Barras Novo Detectado!</h4>
        <p style="font-size: 12px; margin: 4px 0;">Selecione o produto correspondente no CRM:</p>
        
        <div class="form-group">
            <label for="filtroCrm">🔍 Filtrar por Nome ou ID:</label>
            <input type="text" id="filtroCrm" class="input-filtro" placeholder="Digite para pesquisar..." oninput="filtrarListaProdutos(this.value)">
            
            <label for="buscaCrm">Selecionar Produto:</label>
            <select id="buscaCrm">
                <option value="">-- Selecione o Produto --</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="tipoEan">Este código de barras pertence à:</label>
            <select id="tipoEan">
                <option value="UNIDADE">Unidade Comercial (EAN Unitário)</option>
                <option value="CAIXA">Caixa Mãe / Fardo (EAN Caixa)</option>
            </select>
        </div>
        <button type="button" class="btn" style="background-color: #f39c12;" onclick="confirmarVinculo()">Confirmar Vínculo</button>
    </div>

    <form id="coletorForm">
        <div class="form-group">
            <label for="codigoBarras">Código de Barras:</label>
            <input type="text" id="codigoBarras" placeholder="Aguardando bip..." readonly required>
            <button type="button" id="btnBuscarManual" class="btn" onclick="dispararBuscaManual()">🔍 Buscar Código Digitado</button>
        </div>

        <div class="status-produto" id="statusProduto">
            <span id="textoStatus">Produto: Nenhum selecionado</span>
            <button type="button" id="btnMudarVinculo" class="btn-action" style="float: right; padding: 2px 6px; font-size: 10px; margin: 0;" onclick="forçarNovoVinculo()">Mudar Vínculo</button>
        </div>

        <div class="form-group">
            <label for="quantidade">Quantidade Física na Prateleira:</label>
            <input type="number" id="quantidade" placeholder="Digite a quantidade" required disabled>
        </div>

        <button type="submit" id="btnSalvar" class="btn btn-primary" disabled>✓ Salvar Registro</button>
    </form>

    <button id="btnBaixarExcel" class="btn btn-excel">📥 Baixar Planilha Pronta (.CSV)</button>
    
    <div class="historico">
        <h3>Últimos Registros</h3>
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>ID CRM</th>
                    <th>Produto</th>
                    <th>Tipo</th>
                    <th>Qtd</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p style="text-align: right; margin-top: 10px;">
            <button id="btnLimparTudo" class="btn btn-danger" style="width: auto;">Limpar Dados do Celular</button>
        </p>
    </div>
</div>

<!-- 🔥 Bibliotecas do Firebase (precisam vir ANTES de qualquer uso de firebase.*) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    // ⚠️ SUBSTITUA pelo objeto completo copiado em:
    // Firebase Console > Configurações do projeto > Geral > Seus apps > SDK setup
    const firebaseConfig = {
        apiKey: "AIzaSyC4oY0v0YFCJca3iy3mZ7Qv8nN4osaIfoE",
        authDomain: "coletor-estoque-ultra.firebaseapp.com",
        databaseURL: "https://coletor-estoque-ultra-default-rtdb.firebaseio.com",
        projectId: "coletor-estoque-ultra",
        storageBucket: "coletor-estoque-ultra.firebasestorage.app",
        messagingSenderId: "511487689176",
        appId: "1:511487689176:web:a18dbbe711364f53d9b2ad"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // Login anônimo automático — transparente pro usuário final.
    // Nada de leitura/escrita no banco acontece antes disso resolver.
    let authPronto = false;
    auth.signInAnonymously().catch((err) => {
        console.error("❌ Falha na autenticação anônima:", err);
        alert("Não foi possível conectar ao servidor. Verifique sua internet e recarregue a página.");
    });

    auth.onAuthStateChanged((user) => {
        if (user) {
            authPronto = true;
            console.log("🔐 Autenticado anonimamente:", user.uid);
        } else {
            authPronto = false;
        }
    });

    // 📦 O catálogo agora vem do Firebase (nó /Catalogo), não fica mais fixo aqui no código.
    // Assim você atualiza produtos sem precisar editar/reenviar este arquivo.
    let produtosCRM = [];
</script> <!-- 1. Fechamos o script da lista de produtos aqui -->

<script> <!-- 3. Abrimos a tag de programação para o resto do aplicativo funcionar -->
    let html5QrCode;
    let contagensExibidas = JSON.parse(localStorage.getItem('contagensEstoque')) || [];
    
    // dicionarioEAN restabelecido aqui
    let dicionarioEAN = JSON.parse(localStorage.getItem('dicionarioEAN')) || {};

    popularSeletorProdutos(produtosCRM);
    atualizarInterface();
    carregarCatalogoDoFirebase();

    // Busca o catálogo no Firebase. Se der certo, atualiza a tela e guarda uma cópia
    // no localStorage. Se falhar (sem internet, etc), usa a última cópia salva.
    function carregarCatalogoDoFirebase() {
        const statusEl = document.getElementById('statusCatalogo');
        if (statusEl) statusEl.innerText = "🔄 Atualizando catálogo de produtos...";

        database.ref('Catalogo').once('value')
            .then((snapshot) => {
                const dados = snapshot.val();
                if (!dados) {
                    console.warn("⚠️ Catálogo vazio no Firebase, usando cache local se houver.");
                    usarCatalogoDoCache();
                    return;
                }
                produtosCRM = Object.keys(dados).map(id => ({ id: id, nome: dados[id].nome }));
                localStorage.setItem('catalogoCache', JSON.stringify(produtosCRM));
                localStorage.setItem('catalogoCacheData', agoraLocalFormatado());
                popularSeletorProdutos(produtosCRM);
                if (statusEl) statusEl.innerText = `✅ Catálogo atualizado (${produtosCRM.length} produtos)`;
                console.log(`✅ Catálogo carregado do Firebase: ${produtosCRM.length} produtos`);
            })
            .catch((err) => {
                console.error("❌ Falha ao buscar catálogo do Firebase:", err);
                usarCatalogoDoCache();
            });
    }

    function usarCatalogoDoCache() {
        const statusEl = document.getElementById('statusCatalogo');
        const cache = localStorage.getItem('catalogoCache');
        if (cache) {
            produtosCRM = JSON.parse(cache);
            popularSeletorProdutos(produtosCRM);
            const dataCache = localStorage.getItem('catalogoCacheData') || 'data desconhecida';
            if (statusEl) statusEl.innerText = `⚠️ Sem conexão. Usando catálogo salvo em ${dataCache}`;
            console.warn(`⚠️ Usando catálogo em cache (${produtosCRM.length} produtos) de ${dataCache}`);
        } else {
            if (statusEl) statusEl.innerText = "❌ Sem catálogo disponível. Conecte-se à internet e recarregue a página.";
            console.error("❌ Nenhum catálogo em cache e falha ao buscar do Firebase.");
        }
    }

    // Retorna data/hora no horário LOCAL do dispositivo (não UTC), formato YYYY-MM-DD HH:mm:ss
    function agoraLocalFormatado() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function hojeLocalFormatado() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function popularSeletorProdutos(lista) {
        const select = document.getElementById('buscaCrm');
        select.innerHTML = '<option value="">-- Selecione o Produto --</option>';
        lista.forEach(p => {
            const option = document.createElement('option');
            option.value = p.id;
            option.textContent = `[ID: ${p.id}] ${p.nome}`;
            select.appendChild(option);
        });
    }

    // NOVA FUNÇÃO: FILTRA A LISTA CONFORME DIGITA SEM SE PERDER NO SCROLL
    function filtrarListaProdutos(termo) {
        const termoLimpo = termo.toLowerCase().trim();
        if (!termoLimpo) {
            popularSeletorProdutos(produtosCRM);
            return;
        }
        const filtrados = produtosCRM.filter(p => 
            p.id.includes(termoLimpo) || p.nome.toLowerCase().includes(termoLimpo)
        );
        popularSeletorProdutos(filtrados);
    }

    function liberarDigitacaoManual() {
        const campo = document.getElementById('codigoBarras');
        const btnManual = document.getElementById('btnBuscarManual');
        campo.removeAttribute('readonly');
        campo.readOnly = false;
        campo.classList.add('manual-active');
        campo.placeholder = "Digite o código numérico aqui...";
        btnManual.style.display = "block";
        campo.focus();
    }

    function dispararBuscaManual() {
        const campo = document.getElementById('codigoBarras');
        if (!campo.value.trim()) {
            alert("Por favor, digite um código de barras!");
            return;
        }
        verificarCodigoBarras(campo.value.trim());
    }

    function abrirCadastroSemCodigo() {
        resetarInputCodigo();
        document.getElementById('tituloVinculo').innerText = "🚫 Cadastrar Produto Sem Código";
        document.getElementById('filtroCrm').value = '';
        popularSeletorProdutos(produtosCRM);
        document.getElementById('boxVinculo').style.display = 'block';
        document.getElementById('statusProduto').style.display = 'none';
        document.getElementById('boxMultiplos').style.display = 'none';
        document.getElementById('codigoBarras').value = "GERAR_INTERNO";
    }

    function onScanSuccess(decodedText, decodedResult) {
        resetarInputCodigo();
        document.getElementById('codigoBarras').value = decodedText;
        if (navigator.vibrate) navigator.vibrate(100);
        verificarCodigoBarras(decodedText);
    }

    Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length > 0) {
            let cameraId = devices[0].id;
            for (let i = 0; i < devices.length; i++) {
                if (devices[i].label.toLowerCase().includes('back') || devices[i].label.toLowerCase().includes('traseira')) {
                    cameraId = devices[i].id;
                    break;
                }
            }
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(cameraId, { fps: 12, qrbox: { width: 260, height: 120 } }, onScanSuccess)
            .catch(err => console.log("Erro câmera: " + err));
        }
    }).catch(err => console.log("Erro câmera: " + err));

    function verificarCodigoBarras(codigo) {
        if (!codigo || codigo === "GERAR_INTERNO") return;
        
        document.getElementById('boxMultiplos').style.display = 'none';
        document.getElementById('boxVinculo').style.display = 'none';

        if (dicionarioEAN[codigo]) {
            const vinculos = dicionarioEAN[codigo];
            
            // Se houver mais de um produto vinculado ao mesmo código (Caso Azulim vs Estrela)
            if (Array.isArray(vinculos) && vinculos.length > 1) {
                const containerOpcoes = document.getElementById('listaOpcoesProdutos');
                containerOpcoes.innerHTML = '';
                
                vinculos.forEach(v => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-opcao-prod';
                    btn.type = 'button';
                    btn.innerText = `📦 [${v.tipo}] - ${v.nomeCrm} (ID: ${v.idCrm})`;
                    btn.onclick = function() {
                        document.getElementById('boxMultiplos').style.display = 'none';
                        exibirProdutoIdentificado(v.idCrm, v.nomeCrm, v.tipo);
                    };
                    containerOpcoes.appendChild(btn);
                });
                
                document.getElementById('boxMultiplos').style.display = 'block';
                bloquearFormularioContagem();
            } else {
                // Se houver apenas um vínculo (Padrão)
                const únicoVínculo = Array.isArray(vinculos) ? vinculos[0] : vinculos;
                exibirProdutoIdentificado(únicoVínculo.idCrm, únicoVínculo.nomeCrm, únicoVínculo.tipo);
            }
        } else {
            document.getElementById('tituloVinculo').innerText = "⚠️ Código de Barras Novo Detectado!";
            document.getElementById('filtroCrm').value = '';
            popularSeletorProdutos(produtosCRM);
            document.getElementById('boxVinculo').style.display = 'block';
            document.getElementById('statusProduto').style.display = 'none';
            bloquearFormularioContagem();
        }
    }

    function forçarNovoVinculo() {
        document.getElementById('tituloVinculo').innerText = "🔄 Adicionar Novo Vínculo de Equivalência";
        document.getElementById('filtroCrm').value = '';
        popularSeletorProdutos(produtosCRM);
        document.getElementById('boxVinculo').style.display = 'block';
    }

    function confirmarVinculo() {
        let codigoAtual = document.getElementById('codigoBarras').value;
        const idSelecionado = document.getElementById('buscaCrm').value;
        const tipoSelecionado = document.getElementById('tipoEan').value;
        
        if (!idSelecionado) {
            alert("Por favor, selecione qual é o produto correspondente no CRM!");
            return;
        }

        const produtoObjeto = produtosCRM.find(p => p.id === idSelecionado) || { id: idSelecionado, name: "CADASTRO MANUAL" };

        if (codigoAtual === "GERAR_INTERNO") {
            codigoAtual = `${idSelecionado}-INT`;
            document.getElementById('codigoBarras').value = codigoAtual;
        }

        // Nova Estrutura: Salva como Array para aceitar equivalências no mesmo EAN
        if (!dicionarioEAN[codigoAtual]) {
            dicionarioEAN[codigoAtual] = [];
        } else if (!Array.isArray(dicionarioEAN[codigoAtual])) {
            // Converte legados se houver
            dicionarioEAN[codigoAtual] = [dicionarioEAN[codigoAtual]];
        }

        // Evita duplicar exatamente o mesmo ID e Tipo no mesmo código
        const jaExiste = dicionarioEAN[codigoAtual].some(v => v.idCrm === idSelecionado && v.tipo === tipoSelecionado);
        if (!jaExiste) {
            dicionarioEAN[codigoAtual].push({
                idCrm: idSelecionado,
                nomeCrm: produtoObjeto.nome,
                tipo: tipoSelecionado
            });
        }

        localStorage.setItem('dicionarioEAN', JSON.stringify(dicionarioEAN));
        document.getElementById('boxVinculo').style.display = 'none';
        exibirProdutoIdentificado(idSelecionado, produtoObjeto.nome, tipoSelecionado);
    }

    // Variáveis globais de controle para saber qual produto está ativo na tarja verde
    let produtoAtivoId = "";
    let produtoAtivoTipo = "";
    let produtoAtivoNome = "";

    function exibirProdutoIdentificado(id, nome, tipo) {
        produtoAtivoId = id;
        produtoAtivoTipo = tipo;
        produtoAtivoNome = nome;

        document.getElementById('textoStatus').innerText = `📦 [${tipo}] - ${nome} (ID: ${id})`;
        document.getElementById('statusProduto').style.display = 'block';
        
        document.getElementById('quantidade').disabled = false;
        document.getElementById('btnSalvar').disabled = false;
        document.getElementById('quantidade').focus();
    }

    function bloquearFormularioContagem() {
        document.getElementById('quantidade').disabled = true;
        document.getElementById('btnSalvar').disabled = true;
    }

    function resetarInputCodigo() {
        const campo = document.getElementById('codigoBarras');
        const btnManual = document.getElementById('btnBuscarManual');
        campo.readOnly = true;
        campo.setAttribute('readonly', 'readonly');
        campo.classList.remove('manual-active');
        campo.placeholder = "Aguardando bip...";
        btnManual.style.display = "none";
    }

    document.getElementById('coletorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const codigoAtual = document.getElementById('codigoBarras').value;
        let qtdContada = parseInt(document.getElementById('quantidade').value);

        if (!produtoAtivoId) {
            alert("Erro: Nenhum produto ativo selecionado!");
            return;
        }

        if (!authPronto) {
            alert("Ainda conectando ao servidor, aguarde um instante e tente novamente.");
            return;
        }

        let quantidadeFinalNuvem = qtdContada;
        const indexExistente = contagensExibidas.findIndex(item => item.idCrm === produtoAtivoId && item.tipo === produtoAtivoTipo);

        if (indexExistente !== -1) {
            const itemAntigo = contagensExibidas[indexExistente];
            const decisao = confirm(`Atenção: O ID ${produtoAtivoId} já possui contagem!\n\nQuantidade anterior: ${itemAntigo.quantidade}\nNova Digitada: ${qtdContada}\n\nClique em [OK] para SOMAR as duas e ter ${parseInt(itemAntigo.quantidade) + qtdContada}\nClique em [CANCELAR] para SUBSTITUIR e manter apenas ${qtdContada}`);
            
            if (decisao) {
                contagensExibidas[indexExistente].quantidade = parseInt(itemAntigo.quantidade) + qtdContada;
            } else {
                contagensExibidas[indexExistente].quantidade = qtdContada;
            }
            quantidadeFinalNuvem = contagensExibidas[indexExistente].quantidade;
            contagensExibidas[indexExistente].dataHora = agoraLocalFormatado();
        } else {
            const novaContagem = {
                idCrm: produtoAtivoId,
                nomeCrm: produtoAtivoNome,
                tipo: produtoAtivoTipo,
                eanLido: codigoAtual,
                quantidade: qtdContada,
                dataHora: agoraLocalFormatado()
            };
            contagensExibidas.unshift(novaContagem);
        }

        localStorage.setItem('contagensEstoque', JSON.stringify(contagensExibidas));
        
        // ENVIO DO FIREBASE OPERANDO COM A CONEXÃO INSTANCIADA NO TOPO DO ARQUIVO
        database.ref('Coletas_Inventario').push({
            idCrm: produtoAtivoId,
            nomeCrm: produtoAtivoNome,
            tipo: produtoAtivoTipo,
            eanLido: codigoAtual,
            quantidade: quantidadeFinalNuvem,
            dataHora: agoraLocalFormatado()
        })
        .then(() => console.log("🚀 Sincronizado com a Nuvem!"))
        .catch((err) => console.error("❌ Falha ao enviar para o Firebase:", err));

        atualizarInterface();
        
        document.getElementById('coletorForm').reset();
        resetarInputCodigo();
        document.getElementById('statusProduto').style.display = 'none';
        document.getElementById('quantidade').disabled = true;
        document.getElementById('btnSalvar').disabled = true;
        produtoAtivoId = "";
        produtoAtivoTipo = "";
        produtoAtivoNome = "";
    });

    function atualizarInterface() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = '';
        
        const ultimosRegistros = contagensExibidas.slice(0, 3);
        ultimosRegistros.forEach(item => {
            const linha = `<tr>
                <td>${item.idCrm}</td>
                <td>${item.nomeCrm}</td>
                <td><strong>${item.tipo}</strong></td>
                <td>${item.quantidade}</td>
            </tr>`;
            tbody.innerHTML += linha;
        });

        document.getElementById('contadorItens').innerText = `Total de itens coletados: ${contagensExibidas.length}`;
    }

    document.getElementById('btnBaixarExcel').addEventListener('click', function() {
        if (contagensExibidas.length === 0) {
            alert("Não existem dados coletados para exportação!");
            return;
        }

        let csvContent = "\uFEFF"; 
        csvContent += "ID CRM;Nome Produto;Tipo Codigo;Codigo Barras Escaneado;Quantidade Contada;Data Hora Inventario\n";

        contagensExibidas.forEach(item => {
            csvContent += `${item.idCrm};${item.nomeCrm};${item.tipo};${item.eanLido};${item.quantidade};${item.dataHora}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `inventario_crm_final_${hojeLocalFormatado()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    document.getElementById('btnLimparTudo').addEventListener('click', function() {
        if (confirm("Deseja limpar o histórico de contagens? Isso NÃO apagará os vínculos aprendidos.")) {
            localStorage.removeItem('contagensEstoque');
            contagensExibidas = [];
            atualizarInterface();
        }
    });
</script>
</body>
</html>
