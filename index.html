<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor Ultra - Jean</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; color: #2C3E50; margin-bottom: 5px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .btn { width: 100%; padding: 12px; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-primary { background-color: #2ECC71; }
        .btn-excel { background-color: #2980B9; }
        .btn-danger { background-color: #E74C3C; padding: 8px; font-size: 14px; }
        .btn-action { padding: 6px 12px; font-size: 12px; background-color: #34495E; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        #reader { width: 100%; margin-bottom: 15px; border-radius: 8px; overflow: hidden; background-color: #000; }
        .contador { text-align: center; font-weight: bold; margin-bottom: 10px; color: #7F8C8D; }
        
        .box-vinculo { background-color: #fff3cd; border: 1px solid #ffeeba; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .box-vinculo h4 { margin: 0 0 8px 0; color: #856404; }
        
        .status-produto { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 12px; font-weight: bold; display: none; }
        
        .historico { margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f2f2f2; }
        .flex-buttons { display: flex; margin-bottom: 10px; }
        
        /* Destaque para quando a digitação manual estiver ativa */
        .manual-active { background-color: #e8f4fd !important; border: 2px solid #3498db !important; }
        #btnBuscarManual { background-color: #3498db; display: none; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Coletor Estoque Ultra</h2>
    <div class="contador" id="contadorItens">Total de itens coletados: 0</div>

    <div class="box-vinculo" id="statusBase" style="display:block; background-color:#e8f4fd; border-color:#3498db;">
        <span id="textoStatusBase">⚠️ Nenhuma base de produtos importada ainda.</span>
        <button type="button" class="btn-action" id="btnImportarBase" style="margin-top:8px;">📂 Importar Base de Produtos (Excel)</button>
        <input type="file" id="inputImportarBase" accept=".xlsx,.xls" style="display:none;">
    </div>

    <div id="reader"></div>

    <div class="flex-buttons">
        <button type="button" class="btn-action" onclick="liberarDigitacaoManual()">✏️ Digitar Código Manual</button>
        <button type="button" class="btn-action" onclick="abrirCadastroSemCodigo()">🚫 Produto Sem Código</button>
    </div>
    
    <div class="box-vinculo" id="boxVinculo">
        <h4 id="tituloVinculo">⚠️ Código de Barras Novo Detectado!</h4>
        <p style="font-size: 12px; margin: 4px 0;">Selecione o produto correspondente no CRM:</p>
        
        <div class="form-group">
            <label for="buscaCrm">Buscar Produto (Nome ou ID):</label>
            <select id="buscaCrm">
                <option value="">-- Selecione o Produto --</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="tipoEan">Este código de barras pertence à:</label>
            <select id="tipoEan">
                <option value="UNIDADE">Unidade Comercial (EAN Unitário)</option>
                <option value="CAIXA">Caixa Mãe / Fardo (EAN Caixa)</option>
            </select>
        </div>
        <button type="button" class="btn" style="background-color: #f39c12;" onclick="confirmarVinculo()">Confirmar Vínculo</button>
    </div>

    <form id="coletorForm">
        <div class="form-group">
            <label for="codigoBarras">Código de Barras:</label>
            <input type="text" id="codigoBarras" placeholder="Aguardando bip..." readonly required>
            <button type="button" id="btnBuscarManual" class="btn" onclick="dispararBuscaManual()">🔍 Buscar Código Digitado</button>
        </div>

        <div class="status-produto" id="statusProduto">
            <span id="textoStatus">Produto: Nenhum selecionado</span>
            <button type="button" id="btnMudarVinculo" class="btn-action" style="float: right; padding: 2px 6px; font-size: 10px; margin: 0;" onclick="forçarNovoVinculo()">Mudar Vínculo</button>
        </div>

        <div class="form-group">
            <label for="quantidade">Quantidade Física na Prateleira:</label>
            <input type="number" id="quantidade" placeholder="Digite a quantidade" required disabled>
        </div>

        <button type="submit" id="btnSalvar" class="btn btn-primary" disabled>✓ Salvar Registro</button>
    </form>

    <button id="btnBaixarExcel" class="btn btn-excel">📊 Baixar Planilha do Dia (.XLSX)</button>
    <button id="btnBaixarCsv" class="btn btn-excel" style="background-color:#16A085;">📥 Baixar CSV</button>

    <div class="flex-buttons">
        <button type="button" class="btn-action" id="btnExportarVinculos">💾 Exportar Vínculos (backup)</button>
        <button type="button" class="btn-action" id="btnImportarVinculos">📤 Importar Vínculos</button>
        <input type="file" id="inputImportarVinculos" accept=".json" style="display:none;">
    </div>
    <div class="flex-buttons">
        <button type="button" class="btn-action" id="btnExportarContagens">💾 Exportar Contagens (backup)</button>
        <button type="button" class="btn-action" id="btnImportarContagens">📤 Importar Contagens</button>
        <input type="file" id="inputImportarContagens" accept=".json" style="display:none;">
    </div>
    
    <div class="historico">
        <h3>Últimos Registros</h3>
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>ID CRM</th>
                    <th>Produto</th>
                    <th>Tipo</th>
                    <th>Qtd</th>
                    <th>Diferença</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p style="text-align: right; margin-top: 10px;">
            <button id="btnLimparTudo" class="btn btn-danger" style="width: auto;">Limpar Dados do Celular</button>
        </p>
    </div>
</div>

<script>
    // A base de produtos agora vem da planilha importada (veja função importarBaseProdutos),
    // não fica mais fixa no código. Isso evita ter que editar o arquivo toda vez que o CRM muda.
    let produtosCRM = [];

    let html5QrCode;

    // Leitura segura do localStorage: se o dado estiver corrompido, não trava o app inteiro
    function carregarDadosSalvos(chave, valorPadrao) {
        try {
            const bruto = localStorage.getItem(chave);
            if (!bruto) return valorPadrao;
            const dados = JSON.parse(bruto);
            return dados || valorPadrao;
        } catch (erro) {
            console.error(`Erro ao ler "${chave}" do localStorage:`, erro);
            alert(`Atenção: os dados salvos de "${chave}" estavam corrompidos e não puderam ser lidos. Iniciando vazio para essa parte. Se você tinha um backup exportado, use o botão "Importar Vínculos" para restaurar.`);
            return valorPadrao;
        }
    }

    let contagensExibidas = carregarDadosSalvos('contagensEstoque', []);
    let dicionarioEAN = carregarDadosSalvos('dicionarioEAN', {});
    produtosCRM = carregarDadosSalvos('baseProdutos', []);
    let mapaProdutos = {};
    let metaBaseProdutos = carregarDadosSalvos('baseProdutosMeta', null);

    function reconstruirMapaProdutos() {
        mapaProdutos = {};
        produtosCRM.forEach(p => { mapaProdutos[p.id] = p; });
    }
    reconstruirMapaProdutos();

    function atualizarStatusBase() {
        const el = document.getElementById('textoStatusBase');
        if (produtosCRM.length === 0) {
            el.innerHTML = "⚠️ Nenhuma base de produtos importada ainda. Importe a planilha do CRM antes de começar a contagem.";
        } else {
            const dataFmt = metaBaseProdutos ? metaBaseProdutos.dataImportacao : '';
            el.innerHTML = `✅ Base carregada: <strong>${produtosCRM.length}</strong> produto(s)${dataFmt ? ' — importada em ' + dataFmt : ''}.`;
        }
    }
    atualizarStatusBase();

    popularSeletorProdutos();
    atualizarInterface();

    function popularSeletorProdutos() {
        const select = document.getElementById('buscaCrm');
        select.innerHTML = '<option value="">-- Selecione o Produto --</option>';
        produtosCRM.forEach(p => {
            const option = document.createElement('option');
            option.value = p.id;
            option.textContent = `[ID: ${p.id}] ${p.nome}`;
            select.appendChild(option);
        });
    }

    // CORREÇÃO DA FUNÇÃO DE DIGITAÇÃO MANUAL
    function liberarDigitacaoManual() {
        const campo = document.getElementById('codigoBarras');
        const btnManual = document.getElementById('btnBuscarManual');
        
        // Destrava totalmente o input
        campo.removeAttribute('readonly');
        campo.readOnly = false;
        campo.classList.add('manual-active');
        campo.placeholder = "Digite o código numérico aqui...";
        btnManual.style.display = "block"; // Mostra o botão de busca
        campo.focus();
    }

    function dispararBuscaManual() {
        const campo = document.getElementById('codigoBarras');
        if (!campo.value.trim()) {
            alert("Por favor, digite um código de barras!");
            return;
        }
        verificarCodigoBarras(campo.value.trim());
    }

    function abrirCadastroSemCodigo() {
        resetarInputCodigo();
        document.getElementById('tituloVinculo').innerText = "🚫 Cadastrar Produto Sem Código";
        document.getElementById('boxVinculo').style.display = 'block';
        document.getElementById('statusProduto').style.display = 'none';
        document.getElementById('codigoBarras').value = "GERAR_INTERNO";
    }

    function onScanSuccess(decodedText, decodedResult) {
        resetarInputCodigo();
        document.getElementById('codigoBarras').value = decodedText;
        if (navigator.vibrate) navigator.vibrate(100);
        verificarCodigoBarras(decodedText);
    }

    Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length > 0) {
            let cameraId = devices[0].id;
            for (let i = 0; i < devices.length; i++) {
                if (devices[i].label.toLowerCase().includes('back') || devices[i].label.toLowerCase().includes('traseira')) {
                    cameraId = devices[i].id;
                    break;
                }
            }
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(cameraId, { fps: 12, qrbox: { width: 260, height: 120 } }, onScanSuccess)
            .catch(err => console.log("Erro câmera: " + err));
        }
    }).catch(err => console.log("Erro câmera: " + err));

    function verificarCodigoBarras(codigo) {
        if (!codigo || codigo === "GERAR_INTERNO") return;
        
        if (dicionarioEAN[codigo]) {
            const vinculo = dicionarioEAN[codigo];
            exibirProdutoIdentificado(vinculo.idCrm, vinculo.nomeCrm, vinculo.tipo);
        } else {
            document.getElementById('tituloVinculo').innerText = "⚠️ Código de Barras Novo Detectado!";
            document.getElementById('boxVinculo').style.display = 'block';
            document.getElementById('statusProduto').style.display = 'none';
            bloquearFormularioContagem();
        }
    }

    function forçarNovoVinculo() {
        document.getElementById('tituloVinculo').innerText = "🔄 Redirecionar Vínculo deste Código";
        document.getElementById('boxVinculo').style.display = 'block';
    }

    function confirmarVinculo() {
        let codigoAtual = document.getElementById('codigoBarras').value;
        const idSelecionado = document.getElementById('buscaCrm').value;
        const tipoSelecionado = document.getElementById('tipoEan').value;
        
        if (!idSelecionado) {
            alert("Por favor, selecione qual é o produto correspondente no CRM!");
            return;
        }

        const produtoObjeto = produtosCRM.find(p => p.id === idSelecionado) || { id: idSelecionado, nome: "MERCADORIA CADASTRO MANUAL" };

        if (codigoAtual === "GERAR_INTERNO") {
            codigoAtual = `${idSelecionado}-INT`;
            document.getElementById('codigoBarras').value = codigoAtual;
        }

        dicionarioEAN[codigoAtual] = {
            idCrm: idSelecionado,
            nomeCrm: produtoObjeto.nome,
            tipo: tipoSelecionado
        };

        localStorage.setItem('dicionarioEAN', JSON.stringify(dicionarioEAN));
        document.getElementById('boxVinculo').style.display = 'none';
        exibirProdutoIdentificado(idSelecionado, produtoObjeto.nome, tipoSelecionado);
    }

    function exibirProdutoIdentificado(id, nome, tipo) {
        document.getElementById('textoStatus').innerText = `📦 [${tipo}] - ${nome} (ID: ${id})`;
        document.getElementById('statusProduto').style.display = 'block';
        
        document.getElementById('quantidade').disabled = false;
        document.getElementById('btnSalvar').disabled = false;
        document.getElementById('quantidade').focus();
    }

    function bloquearFormularioContagem() {
        document.getElementById('quantidade').disabled = true;
        document.getElementById('btnSalvar').disabled = true;
    }

    function resetarInputCodigo() {
        const campo = document.getElementById('codigoBarras');
        const btnManual = document.getElementById('btnBuscarManual');
        campo.readOnly = true;
        campo.setAttribute('readonly', 'readonly');
        campo.classList.remove('manual-active');
        campo.placeholder = "Aguardando bip...";
        btnManual.style.display = "none";
    }

    document.getElementById('coletorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const codigoAtual = document.getElementById('codigoBarras').value;
        const dadosVinculo = dicionarioEAN[codigoAtual];
        let qtdContada = parseInt(document.getElementById('quantidade').value);

        if (!dadosVinculo) {
            alert("Erro: Vincule o produto antes de salvar!");
            return;
        }

        const produtoBase = mapaProdutos[dadosVinculo.idCrm];
        const depositoOriginal = produtoBase && produtoBase.depositoOriginal !== undefined && produtoBase.depositoOriginal !== null
            ? produtoBase.depositoOriginal
            : null;

        const indexExistente = contagensExibidas.findIndex(item => item.idCrm === dadosVinculo.idCrm && item.tipo === dadosVinculo.tipo);

        if (indexExistente !== -1) {
            const itemAntigo = contagensExibidas[indexExistente];
            const decisao = confirm(`Atenção: O ID ${dadosVinculo.idCrm} já possui contagem!\n\nQuantidade anterior: ${itemAntigo.quantidade}\nNova Digitada: ${qtdContada}\n\nClique em [OK] para SOMAR as duas e ter ${parseInt(itemAntigo.quantidade) + qtdContada}\nClique em [CANCELAR] para SUBSTITUIR e manter apenas ${qtdContada}`);
            
            if (decisao) {
                contagensExibidas[indexExistente].quantidade = parseInt(itemAntigo.quantidade) + qtdContada;
            } else {
                contagensExibidas[indexExistente].quantidade = qtdContada;
            }
            contagensExibidas[indexExistente].dataHora = new Date().toLocaleString('pt-BR');
            contagensExibidas[indexExistente].depositoOriginal = depositoOriginal;
            contagensExibidas[indexExistente].diferenca = depositoOriginal !== null
                ? contagensExibidas[indexExistente].quantidade - depositoOriginal
                : null;
        } else {
            const novaContagem = {
                idCrm: dadosVinculo.idCrm,
                nomeCrm: dadosVinculo.nomeCrm,
                tipo: dadosVinculo.tipo,
                eanLido: codigoAtual,
                quantidade: qtdContada,
                depositoOriginal: depositoOriginal,
                diferenca: depositoOriginal !== null ? (qtdContada - depositoOriginal) : null,
                dataHora: new Date().toLocaleString('pt-BR')
            };
            contagensExibidas.unshift(novaContagem);
        }

        localStorage.setItem('contagensEstoque', JSON.stringify(contagensExibidas));
        atualizarInterface();
        
        document.getElementById('coletorForm').reset();
        resetarInputCodigo();
        document.getElementById('statusProduto').style.display = 'none';
        document.getElementById('quantidade').disabled = true;
        document.getElementById('btnSalvar').disabled = true;
    });

    function atualizarInterface() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = '';
        
        const ultimosRegistros = contagensExibidas.slice(0, 3);
        ultimosRegistros.forEach(item => {
            let textoDiferenca = '—';
            let corDiferenca = '#7F8C8D';
            if (item.diferenca !== null && item.diferenca !== undefined) {
                if (item.diferenca > 0) { textoDiferenca = `+${item.diferenca} (sobra)`; corDiferenca = '#27AE60'; }
                else if (item.diferenca < 0) { textoDiferenca = `${item.diferenca} (falta)`; corDiferenca = '#E74C3C'; }
                else { textoDiferenca = '0 (bateu)'; corDiferenca = '#7F8C8D'; }
            }
            const linha = `<tr>
                <td>${item.idCrm}</td>
                <td>${item.nomeCrm}</td>
                <td><strong>${item.tipo}</strong></td>
                <td>${item.quantidade}</td>
                <td style="color:${corDiferenca}; font-weight:bold;">${textoDiferenca}</td>
            </tr>`;
            tbody.innerHTML += linha;
        });

        document.getElementById('contadorItens').innerText = `Total de itens coletados: ${contagensExibidas.length}`;
    }

    // Monta as linhas de exportação num formato único, reaproveitado pelo CSV e pelo XLSX
    function montarLinhasExportacao() {
        return contagensExibidas.map(item => ({
            'ID CRM': item.idCrm,
            'Descrição': item.nomeCrm,
            'Tipo Código': item.tipo,
            'Código Barras Lido': item.eanLido,
            'DEPOSITO Original': item.depositoOriginal !== null && item.depositoOriginal !== undefined ? item.depositoOriginal : '',
            'DEPOSITO Contado (Novo)': item.quantidade,
            'Diferença': item.diferenca !== null && item.diferenca !== undefined ? item.diferenca : '',
            'Data/Hora Contagem': item.dataHora
        }));
    }

    document.getElementById('btnBaixarExcel').addEventListener('click', function() {
        if (contagensExibidas.length === 0) {
            alert("Não existem dados coletados para exportação!");
            return;
        }
        const linhas = montarLinhasExportacao();
        const worksheet = XLSX.utils.json_to_sheet(linhas);
        worksheet['!cols'] = [{wch:10},{wch:35},{wch:12},{wch:18},{wch:16},{wch:20},{wch:12},{wch:20}];
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Contagem do Dia");
        XLSX.writeFile(workbook, `contagem_estoque_${new Date().toISOString().slice(0,10)}.xlsx`);
    });

    document.getElementById('btnBaixarCsv').addEventListener('click', function() {
        if (contagensExibidas.length === 0) {
            alert("Não existem dados coletados para exportação!");
            return;
        }

        const linhas = montarLinhasExportacao();
        const cabecalhos = Object.keys(linhas[0]);
        // Cada campo de texto vai entre aspas, protegendo contra ";" ou "," dentro do nome do produto
        const escapar = (valor) => `"${String(valor).replace(/"/g, '""')}"`;

        let csvContent = "\uFEFF";
        csvContent += cabecalhos.map(escapar).join(';') + "\n";
        linhas.forEach(linha => {
            csvContent += cabecalhos.map(campo => escapar(linha[campo])).join(';') + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `contagem_estoque_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    document.getElementById('btnLimparTudo').addEventListener('click', function() {
        if (confirm("Deseja limpar o histórico de contagens? Isso NÃO apagará os vínculos aprendidos.")) {
            localStorage.removeItem('contagensEstoque');
            contagensExibidas = [];
            atualizarInterface();
        }
    });

    // Exporta os vínculos EAN -> Produto aprendidos, para backup ou para levar a outro aparelho
    document.getElementById('btnExportarVinculos').addEventListener('click', function() {
        const totalVinculos = Object.keys(dicionarioEAN).length;
        if (totalVinculos === 0) {
            alert("Ainda não existem vínculos aprendidos para exportar.");
            return;
        }
        const conteudoJson = JSON.stringify(dicionarioEAN, null, 2);
        const blob = new Blob([conteudoJson], { type: 'application/json;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `vinculos_ean_backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert(`${totalVinculos} vínculo(s) exportado(s) com sucesso!`);
    });

    // Importa um arquivo de vínculos exportado anteriormente (backup ou de outro aparelho)
    document.getElementById('btnImportarVinculos').addEventListener('click', function() {
        document.getElementById('inputImportarVinculos').click();
    });

    document.getElementById('inputImportarVinculos').addEventListener('change', function(e) {
        const arquivo = e.target.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = function(evento) {
            try {
                const dadosImportados = JSON.parse(evento.target.result);
                if (typeof dadosImportados !== 'object' || Array.isArray(dadosImportados) || dadosImportados === null) {
                    throw new Error("Formato inválido");
                }
                const totalImportados = Object.keys(dadosImportados).length;
                const totalAtual = Object.keys(dicionarioEAN).length;
                const decisao = confirm(`Arquivo contém ${totalImportados} vínculo(s).\n\nClique em [OK] para MESCLAR com os ${totalAtual} vínculo(s) já existentes (recomendado).\nClique em [CANCELAR] para SUBSTITUIR tudo pelos ${totalImportados} importados.`);

                if (decisao) {
                    dicionarioEAN = { ...dicionarioEAN, ...dadosImportados };
                } else {
                    dicionarioEAN = dadosImportados;
                }
                localStorage.setItem('dicionarioEAN', JSON.stringify(dicionarioEAN));
                alert(`Importação concluída! Total de vínculos agora: ${Object.keys(dicionarioEAN).length}`);
            } catch (erro) {
                alert("Erro: o arquivo selecionado não é um backup de vínculos válido.");
                console.error("Erro ao importar vínculos:", erro);
            } finally {
                e.target.value = "";
            }
        };
        leitor.readAsText(arquivo, 'UTF-8');
    });

    // Exporta as contagens do dia em JSON bruto (backup completo, restaurável) —
    // diferente do Excel/CSV, que é o formato "final" pra levar ao CRM.
    document.getElementById('btnExportarContagens').addEventListener('click', function() {
        if (contagensExibidas.length === 0) {
            alert("Ainda não existem contagens para exportar.");
            return;
        }
        const conteudoJson = JSON.stringify(contagensExibidas, null, 2);
        const blob = new Blob([conteudoJson], { type: 'application/json;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `contagens_backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert(`${contagensExibidas.length} contagem(ns) exportada(s) com sucesso!`);
    });

    document.getElementById('btnImportarContagens').addEventListener('click', function() {
        document.getElementById('inputImportarContagens').click();
    });

    document.getElementById('inputImportarContagens').addEventListener('change', function(e) {
        const arquivo = e.target.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = function(evento) {
            try {
                const dadosImportados = JSON.parse(evento.target.result);
                if (!Array.isArray(dadosImportados)) {
                    throw new Error("Formato inválido");
                }
                const totalImportado = dadosImportados.length;
                const totalAtual = contagensExibidas.length;
                const decisao = confirm(`Arquivo contém ${totalImportado} contagem(ns).\n\nClique em [OK] para MESCLAR com as ${totalAtual} contagem(ns) já existentes (produtos repetidos serão atualizados com o valor do arquivo).\nClique em [CANCELAR] para SUBSTITUIR tudo pelas ${totalImportado} contagens importadas.`);

                if (decisao) {
                    dadosImportados.forEach(itemImportado => {
                        const idx = contagensExibidas.findIndex(item => item.idCrm === itemImportado.idCrm && item.tipo === itemImportado.tipo);
                        if (idx !== -1) {
                            contagensExibidas[idx] = itemImportado;
                        } else {
                            contagensExibidas.push(itemImportado);
                        }
                    });
                } else {
                    contagensExibidas = dadosImportados;
                }
                localStorage.setItem('contagensEstoque', JSON.stringify(contagensExibidas));
                atualizarInterface();
                alert(`Importação concluída! Total de contagens agora: ${contagensExibidas.length}`);
            } catch (erro) {
                alert("Erro: o arquivo selecionado não é um backup de contagens válido.");
                console.error("Erro ao importar contagens:", erro);
            } finally {
                e.target.value = "";
            }
        };
        leitor.readAsText(arquivo, 'UTF-8');
    });

    // Importa a base de produtos exportada do CRM (Excel), substituindo a lista local.
    // Mantém vínculos EAN e contagens do dia intactos — só atualiza nomes/saldo DEPOSITO.
    document.getElementById('btnImportarBase').addEventListener('click', function() {
        document.getElementById('inputImportarBase').click();
    });

    document.getElementById('inputImportarBase').addEventListener('change', function(e) {
        const arquivo = e.target.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = function(evento) {
            try {
                const dados = new Uint8Array(evento.target.result);
                const workbook = XLSX.read(dados, { type: 'array' });
                const primeiraAba = workbook.SheetNames[0];
                const linhas = XLSX.utils.sheet_to_json(workbook.Sheets[primeiraAba], { defval: null });

                if (linhas.length === 0) {
                    alert("A planilha está vazia.");
                    return;
                }

                const colunasEncontradas = Object.keys(linhas[0]);
                const colunasObrigatorias = ['Produto', 'Descrição', 'DEPOSITO'];
                const faltando = colunasObrigatorias.filter(c => !colunasEncontradas.includes(c));
                if (faltando.length > 0) {
                    alert(`A planilha não tem as colunas esperadas: ${faltando.join(', ')}.\n\nColunas encontradas: ${colunasEncontradas.join(', ')}\n\nVerifique se é o mesmo formato de exportação do CRM.`);
                    return;
                }

                const novaBase = linhas
                    .filter(l => l['Produto'] !== null && l['Produto'] !== undefined && String(l['Produto']).trim() !== '')
                    .map(l => ({
                        id: String(l['Produto']).trim(),
                        nome: String(l['Descrição'] || '').trim(),
                        depositoOriginal: (l['DEPOSITO'] !== null && l['DEPOSITO'] !== undefined && !isNaN(Number(l['DEPOSITO']))) ? Number(l['DEPOSITO']) : null,
                        loja: (l['LOJA'] !== null && l['LOJA'] !== undefined && !isNaN(Number(l['LOJA']))) ? Number(l['LOJA']) : null,
                        valorVenda: (l['VLR_VENDA'] !== null && l['VLR_VENDA'] !== undefined && !isNaN(Number(l['VLR_VENDA']))) ? Number(l['VLR_VENDA']) : null
                    }));

                if (novaBase.length === 0) {
                    alert("Nenhum produto válido encontrado na planilha (coluna 'Produto' vazia em todas as linhas).");
                    return;
                }

                const confirmacao = confirm(`Encontrados ${novaBase.length} produto(s) na planilha.\n\nIsso vai atualizar a base local (nomes e saldo DEPOSITO), mantendo seus vínculos de código de barras e contagens já feitas hoje.\n\nConfirma a importação?`);
                if (!confirmacao) return;

                produtosCRM = novaBase;
                reconstruirMapaProdutos();
                metaBaseProdutos = { totalProdutos: novaBase.length, dataImportacao: new Date().toLocaleString('pt-BR') };

                localStorage.setItem('baseProdutos', JSON.stringify(produtosCRM));
                localStorage.setItem('baseProdutosMeta', JSON.stringify(metaBaseProdutos));

                popularSeletorProdutos();
                atualizarStatusBase();
                alert(`Base importada com sucesso! ${novaBase.length} produto(s) carregado(s).`);
            } catch (erro) {
                alert("Erro ao ler a planilha. Verifique se o arquivo é um .xlsx válido.");
                console.error("Erro ao importar base de produtos:", erro);
            } finally {
                e.target.value = "";
            }
        };
        leitor.readAsArrayBuffer(arquivo);
    });

</script>
</body>
</html>
